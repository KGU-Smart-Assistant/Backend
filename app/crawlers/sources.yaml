      - "faq"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 2

  portal_schedule: &portal_schedule
    category: academic_schedule
    max_pages: 3
    max_depth: 1
    follow_patterns:
      - "selecttnschafsschdullistus.do"
      - "학사일정"
