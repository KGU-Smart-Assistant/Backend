defaults:
  portal_notice: &portal_notice
    category: notice
    max_pages: 8
    max_depth: 2
    skip_images: true
    follow_patterns:
      - "bbsno=1073"
      - "bbsno=549"
    collect_patterns:
      - "selectbbsnttview.do"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 2

  portal_materials: &portal_materials
    category: materials
    max_pages: 8
    max_depth: 2
    skip_images: true
    follow_patterns:
      - "bbsno=684"
      - ".pdf"
      - ".docx"
      - ".hwp"
      - ".hwpx"
