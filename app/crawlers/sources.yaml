      - "selecttnschafsschdullistus.do"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 2

  external_notice: &external_notice
    category: notice
    max_pages: 8
    max_depth: 2
    follow_patterns:
      - "board"
      - "bo_idx=1"
      - "index.php"
      - ".pdf"
      - ".docx"
      - ".hwp"
      - ".hwpx"
    collect_patterns:
      - "board"
      - "index.php"
    exclude_patterns:
      - "login"
      - "logout"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 2

