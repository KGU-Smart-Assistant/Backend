services:
  
  backend:
    build: .
    container_name: fastapi-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      VECTOR_STORE_MODE: http
      VECTOR_STORE_HOST: chroma
      VECTOR_STORE_PORT: 8000
    depends_on:
      - db
      - chroma
    command: >
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload
      --reload-exclude .tmp
      --reload-exclude .crawl4ai-data
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:1.5.3
    container_name: chroma-db
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
      - ./chroma.docker.yaml:/chroma/config.yaml:ro
    environment:
      CONFIG_PATH: /chroma/config.yaml

volumes:
  postgres_data:
  chroma_data:
